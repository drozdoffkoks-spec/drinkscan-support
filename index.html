<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DrinkScan Support</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ed;
        --surface: #fffaf4;
        --text: #171412;
        --muted: #685f58;
        --border: #ddd1c4;
        --accent: #7a3217;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      header,
      section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 28px;
        margin-bottom: 18px;
      }

      h1,
      h2 {
        line-height: 1.2;
        margin: 0 0 14px;
      }

      p {
        margin: 0 0 14px;
      }

      a {
        color: var(--accent);
        font-weight: 650;
      }

      ul {
        margin: 0;
        padding-left: 22px;
      }

      li + li {
        margin-top: 8px;
      }

      .muted {
        color: var(--muted);
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>DrinkScan Support</h1>
        <p class="muted">Support and legal information for the DrinkScan mobile app.</p>
        <nav aria-label="Support pages">
          <a href="./delete-account/">Delete account</a>
          <a href="./privacy/">Privacy Policy</a>
          <a href="./terms/">Terms of Service</a>
        </nav>
      </header>

      <section>
        <h2>Contact</h2>
        <p>Email: <a href="mailto:drinkscan.support@gmail.com">drinkscan.support@gmail.com</a></p>
      </section>
    </main>
  </body>
</html>
